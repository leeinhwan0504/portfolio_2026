<!DOCTYPE html>
<html lang="ko">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>프로젝트 상세</title>
    <style>
        body { background-color: #f5f5f5; padding: 40px; display: flex; justify-content: center; }
        .slide-container { width: 95%; max-width: 800px; background: #fff; padding: 40px; box-shadow: 0 0 15px rgba(0,0,0,0.1); text-align: center; }
        
        /* 슬라이드 이미지 영역 */
        .slide-img { width: 100%;  background: #ddd; display: flex; align-items: center; justify-content: center; margin-bottom: 20px; overflow: hidden; }
        .slide-img img { width: 100%; height: 100%; object-fit: cover; }
        
        .project-header { text-align: left; margin-bottom: 20px; }
        .project-header h2 { color: #008FD5; border-bottom: 2px solid #008FD5; display: inline-block; }
        .description { text-align: left; line-height: 1.8; color: #444; font-size: 15px; }
        
        .slide-img a {
            display: block;
            width: 100%;
            height: 100%;
        }

        .slide-img img {
            cursor: pointer;
        }
        
        .nav-links { margin-top: 40px; display: flex; justify-content: space-between; }
        .nav-links a { color: #777; text-decoration: none; }

        /* 모바일 대응 */
        @media screen and (max-width: 600px) {
            body { padding: 20px; }
            .slide-container { padding: 20px; }
            .slide-img { height: 220px; }
            .project-header h2 { font-size: 19px; }
            .description { font-size: 14px; }
        }

        /* ===== 인쇄용 스타일 ===== */
        @media print {
            @page {
                size: A4;
                margin: 12mm 15mm;
            }
            body {
                background: none;
                padding: 0;
                display: block;
            }
            .slide-container {
                width: 100%;
                box-shadow: none;
                padding: 0;
            }
            .slide-img {
                height: auto;
                max-height: 300px;
                page-break-inside: avoid;
            }
            .slide-img img {
                object-fit: contain;
            }
            .project-header, .description {
                page-break-inside: avoid;
            }
            .nav-links {
                display: none;
            }
        }
    </style>
</head>
<body>
















<div class="slide-container">
    <div class="project-header">
        <h2>조명설비공사 실습 (옥내조명공사)</h2>
    </div>
    
    <!-- 작업 설명 영역 -->
    <div class="description">
        <p><strong>작업 내용:</strong> 01. 도면 해석 및 회로 분석.</p>
    </div>

    <!-- 사진 영역 -->
    <div class="slide-img">
        <img src="../portfolio/electronic/portfolio_electronic_02_image/image_01.png" alt="실습장면">
    </div>

    <div class="description">
        <p><strong>작업 내용:</strong> 02. 전선관 배관 및 새들 고정 작업.</p>
    </div>
   
    <div class="slide-img">
        <img src="../portfolio/electronic/portfolio_electronic_02_image/image_02.png" alt="실습장면">
    </div>


    <div class="description">
        <p><strong>작업 내용:</strong> 03. 전선 입선 및 최종 점등 테스트.</p>
    </div>

    <div class="slide-img">
        <img src="../portfolio/electronic/portfolio_electronic_02_image/image_03.png" alt="실습장면">
    </div>

    
    <div class="description">
        <p><strong>작업 내용:</strong> 04. 시공 완료.</p>
    </div>

    <div class="slide-img">
        <img src="../portfolio/electronic/portfolio_electronic_02_image/image_04.png" alt="실습장면">
    </div>



    <div class="nav-links">
        <a href="../portfolio/portfolio.html">← 목록으로 돌아가기</a>
    </div>
</div>

</body>
</html>
